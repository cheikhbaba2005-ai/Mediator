{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmer la suppression - Administration</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f8f9fa;
            --secondary: #2b2d42;
            --text-light: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --danger: #e74c3c;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            color: #1a2b4c;
        }

        .confirm-box {
            background: var(--glass-bg);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 2rem auto;
            border: 2px solid rgba(231, 76, 60, 0.3);
        }
        
        .details {
            background: rgba(0,0,0,0.02);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 2rem 0;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            font-weight: 600;
            color: #1a2b4c;
        }

        .btn-danger-premium {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-danger-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            color: #fff;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; transition: transform 0.3s; }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 1rem; }
            .mobile-menu-btn { display: inline-block; background: none; border: none; font-size: 1.5rem; color: var(--secondary); margin-right: 15px; }
            .topbar { flex-direction: row; align-items: center; justify-content: flex-start; }
            .topbar > div:last-child { margin-left: auto; }
            .topbar h2, .topbar h4 { font-size: 1.2rem; }
            .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
            .sidebar-overlay.show { display: block; }
        }
        @media (min-width: 769px) {
            .mobile-menu-btn { display: none; }
            .sidebar-overlay { display: none; }
        }
    </style>

</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('show'); this.classList.remove('show');"></div>


    <div class="confirm-box">
        <div class="icon-circle">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h2 class="mb-3">Confirmer la suppression</h2>
        <p class="text-muted">Vous êtes sur le point de supprimer cet élément. Cette action est irréversible.</p>
        
        <div class="details">
            {{ objet }}
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-3 justify-content-center mt-4">
                <a href="{% url cancel_url %}" class="btn btn-outline-dark px-4 py-2">Annuler</a>
                <button type="submit" class="btn btn-danger-premium">Oui, supprimer définitivement</button>
            </div>
        </form>
    </div>

</body>
</html>
